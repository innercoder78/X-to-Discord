name: Monitor

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: x-discord-monitor
  cancel-in-progress: false

jobs:
  monitor:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment: monitor-state

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install \
            --disable-pip-version-check \
            --no-input \
            --requirement requirements.txt

      - name: Verify GitHub CLI
        run: gh --version >/dev/null

      - name: Run monitor
        env:
          X_SOURCE_TOKEN: ${{ secrets.X_SOURCE_TOKEN }}
          X_MONITORED_ACCOUNT: ${{ secrets.X_MONITORED_ACCOUNT }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          X_POST_ID: ${{ secrets.X_POST_ID }}
          GH_TOKEN: ${{ secrets.GH_UPDATE_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python monitor.py
